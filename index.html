<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ER Nursing Audit (ADPIE) v4+</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
:root {
  --bd-dark: #0d47a1; --bd-light: #e3f2fd; --yw-dark: #f57f17; --yw-light: #fffde7;
  --pass-bg: #e8f5e9; --fail-bg: #ffebee; --body-bg: #f8fafc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Sarabun, sans-serif; background: var(--body-bg); color: #1a237e; font-size: 11px; }
#app { max-width: 1200px; margin: 0 auto; padding: 8px; }
.tabs { display: flex; gap: 4px; margin-bottom: 6px; justify-content: center; flex-wrap: wrap; }
.tabs button { padding: 6px 14px; border: none; border-radius: 6px 6px 0 0; font-size: 11px; font-weight: 700; cursor: pointer; background: #e3f2fd; color: #0d47a1; font-family: inherit; }
.tabs button.on { background: linear-gradient(135deg, var(--bd-dark), var(--yw-dark)); color: #fff; }
.hdr { background: linear-gradient(135deg, #f3f7ff 0%, #fffde7 100%); border: 1.5px solid #fbc02d; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.hdr-title { text-align: center; border-bottom: 2px solid var(--yw-dark); padding-bottom: 4px; margin-bottom: 6px; }
.hdr-title h2 { font-size: 13px; font-weight: 800; color: var(--yw-dark); }
.badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 9px; font-weight: 800; background: #f3f7ff; color: #0d47a1; border: 1px solid #1976d2; }
.r { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.r label { font-weight: 700; font-size: 10px; color: #0d47a1; }
.r input, .r select { padding: 2px 5px; border: 1px solid #1976d2; border-radius: 3px; font-size: 10px; font-family: inherit; background: #f3f7ff; }
.r input[type="date"] { width: 110px; }
.cd { background: #fff; border: 1px solid #e3f2fd; border-radius: 6px; padding: 6px 8px; margin-bottom: 5px; }
.adpie-section { background: linear-gradient(135deg, #f3f7ff, #fffde7); border: 1px solid #1976d2; border-radius: 8px; padding: 8px; margin-bottom: 6px; }
.section-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-weight: 800; font-size: 11px; color: var(--bd-dark); cursor: pointer; }
.section-head::before { content: "▶"; display: inline-block; width: 12px; transition: transform 0.2s; }
.section-head.open::before { transform: rotate(90deg); }
.section-content { display: none; }
.section-content.show { display: block; }
.audit-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px; margin-bottom: 4px; background: #fafbff; border: 1px solid #e8eef5; border-radius: 4px; }
.audit-item-label { flex: 1; font-weight: 600; color: #0d47a1; line-height: 1.3; }
.audit-buttons { display: flex; gap: 2px; }
.score-btn { padding: 2px 6px; border: 1px solid #1976d2; background: #e3f2fd; border-radius: 3px; cursor: pointer; font-size: 9px; font-weight: 700; min-width: 28px; }
.score-btn.active { color: #fff; font-weight: 800; }
.score-btn.p1 { background: #a5d6a7 !important; color: #1b5e20 !important; }
.score-btn.p0 { background: #ef5350 !important; color: #fff !important; }
.score-btn.pN { background: #fdd835 !important; color: #000 !important; }
.score-summary { background: linear-gradient(135deg, var(--bd-light), var(--yw-light)); border: 1px solid #1976d2; border-radius: 6px; padding: 8px 10px; margin-bottom: 5px; display: flex; gap: 12px; flex-wrap: wrap; }
.score-summary > div { font-size: 10px; color: #0d47a1; }
.score-summary b { font-size: 14px; font-weight: 800; }
.btn { padding: 5px 12px; border: none; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-p { background: var(--bd-dark); color: #fff; }
.btn-s { background: #388e3c; color: #fff; }
.btn-o { background: #fff; border: 1.5px solid #1976d2; color: #0d47a1; }
.btn-pull { background: linear-gradient(135deg, #4db8ff, #0066cc); color: #fff; border: none; }
.msg { padding: 5px 8px; text-align: center; border-radius: 5px; font-weight: 700; margin-bottom: 4px; font-size: 11px; background: #e3f2fd; color: #0d47a1; }
.kpi-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.kpi { flex: 1; min-width: 100px; background: linear-gradient(135deg, #f3f7ff, #fffde7); border: 1px solid #1976d2; border-radius: 8px; padding: 8px; text-align: center; }
.kpi .kl { font-size: 8.5px; color: #3f51b5; margin-bottom: 2px; }
.kpi .kv { font-weight: 800; font-size: 16px; color: var(--bd-dark); }
table.tbl { border-collapse: collapse; width: 100%; font-size: 10px; margin: 4px 0; }
table.tbl th { background: var(--bd-dark); color: #fff; padding: 3px; border: 1px solid #0d47a1; font-size: 9px; font-weight: 700; }
table.tbl td { border: 1px solid #e8eef5; padding: 2px 3px; text-align: center; }
table.tbl tr.pass td { background: #e8f5e9; }
table.tbl tr.fail td { background: #ffebee; }
.status-pass { display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--pass-bg); color: #1b5e20; font-weight: 700; font-size: 9px; }
.status-fail { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #ffcdd2; color: #b71c1c; font-weight: 700; font-size: 9px; }
.chart-container { position: relative; height: 250px; margin: 8px 0; padding: 8px; background: #fafbff; border: 1px solid #e3f2fd; border-radius: 6px; }
.rpt-title { text-align: center; font-weight: 800; font-size: 12px; color: var(--bd-dark); border-bottom: 2px solid var(--yw-dark); padding-bottom: 3px; margin-bottom: 5px; }
.weak-item { background: #ffebee; border: 1px solid #ef5350; border-left: 4px solid #d32f2f; border-radius: 4px; padding: 6px; margin-bottom: 6px; }
.weak-item-title { font-weight: 700; color: #b71c1c; font-size: 10px; margin-bottom: 2px; }
.weak-item-desc { font-size: 9px; color: #666; }
.color-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin: 8px 0; }
.color-box { border: 1px solid #ddd; border-radius: 6px; padding: 8px; background: #fff; }
.color-box label { display: block; font-weight: 700; font-size: 9px; color: #0d47a1; margin-bottom: 4px; }
.color-box input[type="color"] { width: 100%; height: 32px; cursor: pointer; border: none; border-radius: 3px; }
@media print {
  .tabs, .btn, .msg { display: none !important; }
  .cd:first-of-type { display: none !important; }
  body { margin: 0; padding: 0; font-size: 9px; line-height: 1.1; }
  #app { max-width: 100%; margin: 0; padding: 0; display: block; }
  .hdr { margin: 0 0 6px 0; padding: 4px 6px; page-break-inside: avoid; font-size: 9px; }
  .hdr-title h2 { font-size: 11px; }
  .hdr-title { padding-bottom: 2px; margin-bottom: 4px; }
  .r { margin-bottom: 2px; }
  .r label { font-size: 8px; }
  .r input, .r select { font-size: 8px; padding: 1px 3px; }
  .cd { margin-bottom: 8px; padding: 4px 5px; page-break-inside: avoid; display: block; border: 0.5px solid #ddd; }
  .score-summary { margin-bottom: 6px; padding: 4px; font-size: 8px; page-break-inside: avoid; }
  .score-summary b { font-size: 11px; }
  .rpt-title { font-size: 10px; margin-bottom: 4px; padding-bottom: 2px; }
  .kpi-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-bottom: 8px; page-break-inside: avoid; }
  .kpi { padding: 4px; font-size: 7px; min-width: auto; flex: none; break-inside: avoid; }
  .kpi .kl { font-size: 7px; margin-bottom: 2px; }
  .kpi .kv { font-size: 13px; }
  table.tbl { page-break-inside: avoid; width: 100%; margin: 6px 0 !important; font-size: 8px; }
  table.tbl th { padding: 1px 2px; font-size: 7px; background-color: #0d47a1 !important; color: #fff !important; }
  table.tbl td { padding: 1px 2px; font-size: 7px; border: 0.5px solid #999 !important; }
  table.tbl tr.pass td { background-color: #c8e6c9 !important; }
  table.tbl tr.fail td { background-color: #ffcccc !important; }
  .chart-container { height: 120px; margin: 4px 0 10px 0 !important; page-break-inside: avoid; padding: 3px; }
  .chart-container canvas { max-height: 120px !important; }
  .weak-item { display: none !important; }
  .status-pass, .status-fail { font-size: 7px; padding: 1px 4px; }
  .badge { font-size: 8px; padding: 2px 8px; }
  @page { margin: 8mm; size: A4; }
}
